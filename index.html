<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Gravity Simulation - Cosmic Dust</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #controls input {
            width: 80px;
        }
        #particle-count {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 1.2em;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
        }
        #error-log-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        #error-log {
            width: 300px;
            height: 100px;
            background: rgba(0, 0, 0, 0.7);
            color: lime;
            border: 1px solid lime;
            font-family: monospace;
            resize: none;
            overflow-y: scroll;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas"></canvas>
    
    <div id="controls">
        <div class="control-group">
            <label for="gravityInput">重力定数:</label>
            <input type="number" id="gravityInput" value="500" step="100">
        </div>
        <div class="control-group">
            <label for="numParticlesInput">初期粒子数:</label>
            <input type="number" id="numParticlesInput" value="1000" step="10">
        </div>
        <div class="control-group">
            <label for="dtInput">タイムステップ(DT):</label>
            <input type="number" id="dtInput" value="0.01" step="0.005">
        </div>
        <div class="control-group">
            <label for="maxDistanceInput">重力範囲:</label>
            <input type="number" id="maxDistanceInput" value="5000" step="50">
        </div>
        <div class="control-group">
            <label for="minMassInput">最小質量(周回):</label>
            <input type="number" id="minMassInput" value="1" step="1">
        </div>
        <div class="control-group">
            <label for="maxMassInput">最大質量(周回):</label>
            <input type="number" id="maxMassInput" value="10" step="1">
        </div>
        <div class="control-group">
            <label for="centralMassInput">中心質量:</label>
            <input type="number" id="centralMassInput" value="1000" step="10">
        </div>
        <button id="applyButton">適用 & リセット</button>
        <button id="pauseButton">⏸️ 一時停止</button>
    </div>

    <p id="particle-count">粒子数: 00250</p>
    
    <div id="error-log-container">
        <label for="error-log">ログ:</label>
        <textarea id="error-log" readonly></textarea>
    </div>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const gravityInput = document.getElementById('gravityInput');
        const numParticlesInput = document.getElementById('numParticlesInput');
        const dtInput = document.getElementById('dtInput');
        const maxDistanceInput = document.getElementById('maxDistanceInput');
        const minMassInput = document.getElementById('minMassInput');
        const maxMassInput = document.getElementById('maxMassInput');
        const centralMassInput = document.getElementById('centralMassInput');
        const applyButton = document.getElementById('applyButton');
        const pauseButton = document.getElementById('pauseButton');
        const particleCountDisplay = document.getElementById('particle-count');
        const logWindow = document.getElementById('error-log');

        const ASPECT_RATIO_W = 16;
        const ASPECT_RATIO_H = 9;

        function setCanvasSize() {
            const windowRatio = window.innerWidth / window.innerHeight;
            if (windowRatio > ASPECT_RATIO_W / ASPECT_RATIO_H) {
                canvas.height = window.innerHeight;
                canvas.width = window.innerHeight * ASPECT_RATIO_W / ASPECT_RATIO_H;
            } else {
                canvas.width = window.innerWidth;
                canvas.height = window.innerWidth * ASPECT_RATIO_H / ASPECT_RATIO_W;
            }
        }

        setCanvasSize();

        window.addEventListener('resize', setCanvasSize);

        let NUM_PARTICLES = parseInt(numParticlesInput.value);
        let GRAVITATIONAL_CONSTANT = parseFloat(gravityInput.value);
        let DT = parseFloat(dtInput.value);
        let MAX_DISTANCE = parseFloat(maxDistanceInput.value);
        let MIN_INITIAL_MASS = parseInt(minMassInput.value);
        let MAX_INITIAL_MASS = parseInt(maxMassInput.value);
        let CENTRAL_MASS = parseFloat(centralMassInput.value);
        const FRICTION = 1.0;

        const MIN_MASS_PRODUCT = 50;
        const ROCHE_LIMIT_CONSTANT = 2.44;
        const UPDATE_STEPS_PER_FRAME = 2;

        let particles = [];
        let isPaused = false;

        function logMessage(message) {
            logWindow.value += message + '\n';
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        function parseRgb(rgbString) {
            const match = rgbString.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
            if (match) {
                return {
                    r: parseInt(match[1]),
                    g: parseInt(match[2]),
                    b: parseInt(match[3])
                };
            }
            if (rgbString.startsWith('#')) {
                const hex = rgbString.slice(1);
                return {
                    r: parseInt(hex.substring(0, 2), 16),
                    g: parseInt(hex.substring(2, 4), 16),
                    b: parseInt(hex.substring(4, 6), 16)
                };
            }
            return { r: 0, g: 0, b: 0 };
        }

        class Particle {
            constructor(x, y, mass, hasDecomposed = false) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.mass = mass;
                this.radius = Math.pow(this.mass, 1/3) * 1.0;
                this.drawRadius = this.radius;
                this.hasDecomposed = hasDecomposed;
                
                const minMass = MIN_INITIAL_MASS;
                const maxMass = MAX_INITIAL_MASS;
                const massRatio = (this.mass - minMass) / (maxMass - minMass);
                
                const r = 255;
                const g = 255;
                const b = Math.floor(255 * (1 - massRatio * 0.5));
                this.originalColor = `rgb(${r}, ${g}, ${b})`;
                this.color = this.originalColor;
            }

            draw() {
                const drawX = this.x + canvas.width / 2;
                const drawY = this.y + canvas.height / 2;

                if (drawX >= 0 && drawX <= canvas.width && drawY >= 0 && drawY <= canvas.height) {
                    ctx.beginPath();
                    ctx.arc(drawX, drawY, this.drawRadius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
        
        function formatParticleCount(count) {
            return String(count).padStart(5, '0');
        }

        function initParticles() {
            particles = [];
            const boundingRadius = Math.min(canvas.width, canvas.height) / 2 - 2;
            logWindow.value = "";

            const central = new Particle(0, 0, CENTRAL_MASS);
            central.originalColor = `rgb(255, 255, 0)`;
            central.color = central.originalColor;
            particles.push(central);

            while (particles.length < NUM_PARTICLES) {
                const x = (Math.random() * 2 - 1) * boundingRadius;
                const y = (Math.random() * 2 - 1) * boundingRadius;

                const distFromCenter = Math.sqrt(x * x + y * y);
                
                if (distFromCenter < boundingRadius) {
                    const mass = Math.floor(Math.random() * (MAX_INITIAL_MASS - MIN_INITIAL_MASS + 1)) + MIN_INITIAL_MASS;
                    const newParticle = new Particle(x, y, mass);
                    
                    const angle = Math.atan2(y, x);
                    const speed = Math.sqrt(GRAVITATIONAL_CONSTANT * central.mass / (distFromCenter + 1));
                    
                    newParticle.vx = -Math.sin(angle) * speed * (1 + (Math.random() - 0.5) * 0.5);
                    newParticle.vy = Math.cos(angle) * speed * (1 + (Math.random() - 0.5) * 0.5);

                    particles.push(newParticle);
                }
            }
            
            particleCountDisplay.textContent = `粒子数: ${formatParticleCount(particles.length)}`;
            logMessage("シミュレーションがリセットされました。");
        }
        
        function update() {
            const particlesToAdd = [];
            const particlesToRemove = new Set();
            const mass1Radius = Math.pow(1, 1/3) * 1.0;
            
            const tempParticles = [...particles];

            const mergePairs = [];
            const decomposeTargets = new Set();

            for (let i = 0; i < tempParticles.length; i++) {
                const p1 = tempParticles[i];
                if (particlesToRemove.has(p1)) continue;

                for (let j = i + 1; j < tempParticles.length; j++) {
                    const p2 = tempParticles[j];
                    if (particlesToRemove.has(p2)) continue;
                    
                    if (p1 === p2) continue;

                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance > 1) {
                        const massProduct = p1.mass * p2.mass;
                        if (!(distance > MAX_DISTANCE && massProduct < MIN_MASS_PRODUCT)) {
                            const force = (GRAVITATIONAL_CONSTANT * massProduct) / (distance * distance);
                            const angle = Math.atan2(dy, dx);
                            const fx = Math.cos(angle) * force;
                            const fy = Math.sin(angle) * force;

                            p1.vx += (fx / p1.mass) * DT;
                            p1.vy += (fy / p1.mass) * DT;
                            p2.vx -= (fx / p2.mass) * DT;
                            p2.vy -= (fy / p2.mass) * DT;
                        }
                    }

                    if (distance < p1.radius + p2.radius) {
                        mergePairs.push([p1, p2]);
                    }
                }
            }

            for (let i = 0; i < tempParticles.length; i++) {
                const p1 = tempParticles[i];
                if (p1.hasDecomposed || particlesToRemove.has(p1)) continue;

                for (let j = i + 1; j < tempParticles.length; j++) {
                    const p2 = tempParticles[j];
                    if (p2.hasDecomposed || particlesToRemove.has(p2)) continue;
                    if (p1 === p2) continue;
                    
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (p1.mass >= 2) {
                        const p1RocheLimit = p2.radius * Math.pow((p2.mass / p1.mass), 1/3) * ROCHE_LIMIT_CONSTANT;
                        if (distance < p1RocheLimit) {
                            decomposeTargets.add(p1);
                        }
                    }
                    if (p2.mass >= 2) {
                        const p2RocheLimit = p1.radius * Math.pow((p1.mass / p2.mass), 1/3) * ROCHE_LIMIT_CONSTANT;
                        if (distance < p2RocheLimit) {
                            decomposeTargets.add(p2);
                        }
                    }
                }
            }
            
            const mergedParticles = new Set();
            for (const [p1, p2] of mergePairs) {
                if (mergedParticles.has(p1) || mergedParticles.has(p2) || particlesToRemove.has(p1) || particlesToRemove.has(p2)) continue;
                
                const newMass = p1.mass + p2.mass;
                const newVx = (p1.vx * p1.mass + p2.vx * p2.mass) / newMass;
                const newVy = (p1.vy * p1.mass + p2.vy * p2.mass) / newMass;
                const newX = (p1.x * p1.mass + p2.x * p2.mass) / newMass;
                const newY = (p1.y * p1.mass + p2.y * p2.mass) / newMass;
                
                const newParticle = new Particle(newX, newY, newMass);
                newParticle.vx = newVx;
                newParticle.vy = newVy;
                particlesToAdd.push(newParticle);

                particlesToRemove.add(p1);
                particlesToRemove.add(p2);
                mergedParticles.add(p1);
                mergedParticles.add(p2);
            }
            
            for (const p of decomposeTargets) {
                if (particlesToRemove.has(p)) continue;
                particlesToRemove.add(p);
                
                const parentVx = p.vx;
                const parentVy = p.vy;
                
                const newParticlesCount = Math.floor(p.mass);
                
                for (let k = 0; k < newParticlesCount; k++) {
                    const randomAngle = Math.random() * Math.PI * 2;
                    const distFromParentCenter = mass1Radius * 1.5;
                    
                    const newX = p.x + distFromParentCenter * Math.cos(randomAngle);
                    const newY = p.y + distFromParentCenter * Math.sin(randomAngle);
                    
                    const newParticle = new Particle(newX, newY, 1, true);
                    
                    newParticle.vx = parentVx;
                    newParticle.vy = parentVy;
                    
                    newParticle.color = '#00FFFF';
                    particlesToAdd.push(newParticle);
                }
            }
            
            const nextParticles = particles.filter(p => !particlesToRemove.has(p));
            nextParticles.push(...particlesToAdd);
            particles = nextParticles;

            const boundingRadius = Math.min(canvas.width, canvas.height) / 2 - 2;
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];

                p.x += p.vx * DT;
                p.y += p.vy * DT;
                p.vx *= FRICTION;
                p.vy *= FRICTION;
            
                const distFromCenter = Math.sqrt(p.x * p.x + p.y * p.y);
                if (distFromCenter > boundingRadius) {
                    p.x = -p.x;
                    p.y = -p.y;
                }
            }
            
            particleCountDisplay.textContent = `粒子数: ${formatParticleCount(particles.length)}`;
        }

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const drawRadius = Math.min(canvas.width, canvas.height) / 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, drawRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            for (const p of particles) {
                if (p.color !== p.originalColor) {
                    const currentRgb = parseRgb(p.color);
                    const originalRgb = parseRgb(p.originalColor);
                    const blendFactor = 0.05;

                    currentRgb.r = Math.round(currentRgb.r * (1 - blendFactor) + originalRgb.r * blendFactor);
                    currentRgb.g = Math.round(currentRgb.g * (1 - blendFactor) + originalRgb.g * blendFactor);
                    currentRgb.b = Math.round(currentRgb.b * (1 - blendFactor) + originalRgb.b * blendFactor);
                    
                    p.color = `rgb(${currentRgb.r}, ${currentRgb.g}, ${currentRgb.b})`;

                    const colorDiff = Math.abs(currentRgb.r - originalRgb.r) + Math.abs(currentRgb.g - originalRgb.g) + Math.abs(currentRgb.b - originalRgb.b);
                    if (colorDiff < 10) {
                        p.color = p.originalColor;
                    }
                }
                p.draw();
            }
        }

        function gameLoop() {
            if (!isPaused) {
                for (let i = 0; i < UPDATE_STEPS_PER_FRAME; i++) {
                    update();
                }
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        applyButton.addEventListener('click', () => {
            const newGravityValue = parseFloat(gravityInput.value);
            const newNumParticlesValue = parseInt(numParticlesInput.value);
            const newDtValue = parseFloat(dtInput.value);
            const newMaxDistanceValue = parseFloat(maxDistanceInput.value);
            const newMinMassValue = parseInt(minMassInput.value);
            const newMaxMassValue = parseInt(maxMassInput.value);
            const newCentralMassValue = parseFloat(centralMassInput.value);

            if (!isNaN(newGravityValue)) {
                GRAVITATIONAL_CONSTANT = newGravityValue;
            } else {
                gravityInput.value = GRAVITATIONAL_CONSTANT;
            }
            
            if (!isNaN(newDtValue)) {
                DT = newDtValue;
            } else {
                dtInput.value = DT;
            }

            if (!isNaN(newMaxDistanceValue)) {
                MAX_DISTANCE = newMaxDistanceValue;
            } else {
                maxDistanceInput.value = MAX_DISTANCE;
            }

            if (!isNaN(newMinMassValue)) {
                MIN_INITIAL_MASS = newMinMassValue;
            } else {
                minMassInput.value = MIN_INITIAL_MASS;
            }

            if (!isNaN(newMaxMassValue) && newMaxMassValue >= MIN_INITIAL_MASS) {
                MAX_INITIAL_MASS = newMaxMassValue;
            } else {
                maxMassInput.value = MAX_INITIAL_MASS;
            }

            if (!isNaN(newNumParticlesValue) && newNumParticlesValue > 0) {
                NUM_PARTICLES = newNumParticlesValue;
                CENTRAL_MASS = newCentralMassValue;
                isPaused = false;
                initParticles();
            } else {
                numParticlesInput.value = NUM_PARTICLES;
            }
        });

        pauseButton.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                pauseButton.textContent = '▶️ 再開';
                logMessage("シミュレーションが一時停止されました。");
            } else {
                pauseButton.textContent = '⏸️ 一時停止';
                logMessage("シミュレーションが再開されました。");
            }
        });

        initParticles();
        gameLoop();
    </script>
</body>
</html>
